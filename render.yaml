services:
  - type: web
    name: code-duel
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/game.db
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
